name: Unzip File in Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Bot ko write access dene ke liye yeh block zaroori hai
permissions:
  contents: write

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip -o Custom---made-main.zip -d .

      - name: Commit and push unzipped files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git status --porcelain | grep -q .; then
            git commit -m "Automated: Unzipped Custom---made-main.zip"
            git push
          else
            echo "No changes to commit"
          fi

name: Unzip File in Repository

on:
  push:
    branches:
      - main  # Jab main branch par push hoga tab chalega
  workflow_dispatch: # Direct manually run karne ke liye bhi option rahega

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          # Zip file ko current directory (. -d .) ma extract karega
          # Agar kisi specific folder ma unzip karna ho to -d ./my-folder likhein
          unzip -o Custom---made-main.zip -d .

      - name: Commit and push unzipped files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check agar koi naye files hain tabhi commit karega
          if git status --porcelain | grep -q .; then
            git commit -m "Automated: Unzipped Custom---made-main.zip"
            git push
          else
            echo "No changes to commit"
          fi

name: Delete All Files

on:
  workflow_dispatch: # Actions tab se manually run karne ke liye

jobs:
  delete-everything:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete all files except .git and workflow file
        run: |
          # Sab kuch delete karein sivay .git aur current workflow file ke
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # Git status check karein
          git status

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff-index --quiet HEAD; then
            echo "Koyi changes nahi hain delete karne ke liye."
          else
            git commit -m "Delete all contents via GitHub Actions"
            git push
          fi
